[package]
name = "autoresearch"
version = "0.1.0"
description = "Agents and skills for coordinating AI research loops: evidence-grounded dialogue, experiment design, run supervision, result triage, and durable research memory."

[dependencies.meridian-base]
url = "https://github.com/haowjy/meridian-base"
version = ">=0.7.34, <0.8.0"

[dependencies.meridian-dev-workflow]
url = "https://github.com/haowjy/meridian-dev-workflow"
version = ">=0.11.0, <0.12.0"

[settings]
targets = [
    ".codex",
    ".claude",
    ".cursor",
    ".opencode",
]
models_cache_ttl_hours = 24
